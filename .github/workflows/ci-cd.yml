name: CI/CD Pipeline

# Run CI on changes to main and dev branches and PRs targeting them.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository code.
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Python 3.11 for tests.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies and test tooling.
      - name: Install dependencies
        run: |
          pip install -r requirements-inference.txt
          pip install pytest pytest-cov

      # Run test suite with coverage.
      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing -v

  build-docker:
    # Only build if tests succeed.
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      # Checkout repository code.
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: set up Python (not required for Docker build).
      - name: Setup Python (optional)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Build Docker image locally (no registry push).
      - name: Build Docker image
        run: docker build -t api .

  deploy-hf:
    # Deploy to Hugging Face only after tests pass.
    needs: test
    if: success() && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: https://huggingface.co/spaces/ASI-Engineer/OC_P8_test
        run: |
          git push "https://user:${HF_TOKEN}@${HF_SPACE_URL#https://}" HEAD:main
